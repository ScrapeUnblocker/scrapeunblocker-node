name: Publish to npm

# Publishes on every GitHub Release using an npm token stored as the NPM_TOKEN
# repository secret. Create an "Automation" (or granular read+write) token at
# https://www.npmjs.com/settings/scrapeunblocker/tokens and add it under
# Settings -> Secrets and variables -> Actions -> New repository secret.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
