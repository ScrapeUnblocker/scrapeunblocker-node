name: Publish to npm

# Publishes on every GitHub Release using npm Trusted Publishing (OIDC) - no
# token stored, nothing to expire. Configure the trusted publisher once on the
# package settings page (npmjs.com/package/scrapeunblocker -> Settings ->
# Trusted Publisher): GitHub Actions, org ScrapeUnblocker, repo
# scrapeunblocker-node, workflow publish.yml.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs a recent npm (>= 11.5).
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
